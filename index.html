<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rashi Kirana Store | Online Shopping</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f7f7f7; }
    header { background:#00A651; color:white; padding:15px; text-align:center; }
    nav { background:#ffffff; display:flex; justify-content:space-around; padding:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    nav a { text-decoration:none; color:#333; font-weight:bold; }
    .container { padding:15px; }
    .products { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:15px; }
    .card { background:white; padding:10px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); text-align:center; }
    .card img { width:100%; height:120px; object-fit:contain; }
    .card button { background:#00A651; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer; }
    footer { background:#222; color:white; text-align:center; padding:10px; margin-top:20px; }
  </style>
</head>
<body>

<header>
  <h1>Rashi Kirana Store</h1>
  <p>Chhatarpur | Contact: 6266467358</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Groceries</a>
  <a href="#">Drinks</a>
  <a href="#">Cart</a>
</nav>

<div class="container">
  <h2>Popular Products</h2>
  <div class="products">
    <div class="card">
      <h3>Basmati Rice 5kg</h3>
      <p>₹450</p>
      <button>Add to Cart</button>
    </div>
    <div class="card">
      <h3>Refined Oil 1L</h3>
      <p>₹160</p>
      <button>Add to Cart</button>
    </div>
    <div class="card">
      <h3>Sugar 1kg</h3>
      <p>₹45</p>
      <button>Add to Cart</button>
    </div>
    <div class="card">
      <h3>Cold Drink 750ml</h3>
      <p>₹40</p>
      <button>Add to Cart</button>
    </div>
  </div>
</div>

<footer>
  <p>© 2026 Rashi Kirana Store. All Rights Reserved.</p>
</footer>

</body>
</html>
